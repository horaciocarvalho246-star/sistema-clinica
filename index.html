    <script>
    function ajustarAltura() {
        var wrapper = document.querySelector('.table-wrapper');
        if (!wrapper) return;
        var rect = wrapper.getBoundingClientRect();
        var altura = window.innerHeight - rect.top - 20;
        wrapper.style.maxHeight = Math.max(150, altura) + 'px';
    }

    function sincronizarScroll() {
        var wrapper = document.getElementById('tableWrapper');
        var topBar = document.getElementById('scrollTopBar');
        var topBarInner = document.getElementById('scrollTopBarInner');
        if (!wrapper || !topBar || !topBarInner) return;

        // Ajusta largura do inner para corresponder ao scroll width da tabela
        var table = wrapper.querySelector('table');
        if (table) {
            topBarInner.style.width = table.scrollWidth + 'px';
        }

        // Sincroniza scroll
        var syncingFromTop = false;
        var syncingFromWrapper = false;

        topBar.addEventListener('scroll', function() {
            if (syncingFromWrapper) return;
            syncingFromTop = true;
            wrapper.scrollLeft = topBar.scrollLeft;
            syncingFromTop = false;
        });

        wrapper.addEventListener('scroll', function() {
            if (syncingFromTop) return;
            syncingFromWrapper = true;
            topBar.scrollLeft = wrapper.scrollLeft;
            syncingFromWrapper = false;
        });
    }

    window.addEventListener('resize', ajustarAltura);
    var obs = new MutationObserver(function(){ 
        setTimeout(ajustarAltura, 100);
        setTimeout(sincronizarScroll, 200);
    });
    document.addEventListener('DOMContentLoaded', function() {
        obs.observe(document.getElementById('root'), { childList: true, subtree: true });
        setTimeout(ajustarAltura, 800);
        setTimeout(ajustarAltura, 2000);
        setTimeout(sincronizarScroll, 1000);
        setTimeout(sincronizarScroll, 2500);
    });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MESES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        // Função para converter para Title Case (Primeira Letra Maiúscula)
        const toTitleCase = (str) => {
            if (!str) return '';
            const preposicoes = ['de', 'da', 'das', 'do', 'dos', 'e'];
            return str.toLowerCase().split(' ').map((word, index) => {
                // Primeira palavra sempre maiúscula
                if (index === 0) {
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }
                // Preposições ficam em minúsculo
                if (preposicoes.includes(word)) {
                    return word;
                }
                // Demais palavras com primeira letra maiúscula
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');
        };

        const DADOS_INICIAIS = {
            convenios: ['Unimed', 'Santa Casa', 'Sul America', 'SFV'],
            terapias: ['Psicologia', 'Fono', 'TO'],
            responsaveis: ['Raissa', 'Silvia'],
            cids: ['F41.1'],
            cbos: ['225133'],
            situacoes: ['Em Análise', 'Autorizada', 'Cancelada', 'Suspensa'],
            diasSemana: ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'],
            unidades: ['Matriz', 'Filial'],
            conselhos: ['66141', '111082']
        };


        const PB_URL = 'http://187.77.246.135:8090';

        // Carrega consultas do mês do PocketBase
        async function carregarDoSheets(aba) {
            try {
                const [ano, mes] = aba.split('-').map(Number);
                const mesIdx = mes - 1;
                let todos = [];
                let pagina = 1;
                while (true) {
                    const res = await fetch(`${PB_URL}/api/collections/consultas/records?filter=(mes=${mesIdx}%26%26ano=${ano})&perPage=200&page=${pagina}`);
                    const data = await res.json();
                    if (!data.items || data.items.length === 0) break;
                    todos = todos.concat(data.items);
                    if (todos.length >= data.totalItems) break;
                    pagina++;
                }
                return todos.map(item => ({
                    ...item,
                    id: item.id,
                    mes: Number(item.mes),
                    ano: Number(item.ano),
                    quantidade: item.quantidade !== '' ? item.quantidade : '',
                    terapia: String(item.terapia || '').trim()
                }));
            } catch(e) { console.error('PB load error:', e); return null; }
        }

        // Salva lote na importação
        async function salvarNoSheets(aba, linhas) {
            try {
                if (!linhas || linhas.length === 0) return;
                // Primeiro apaga todos os registros do mês
                const [ano, mes] = aba.split('-').map(Number);
                const mesIdx = mes - 1;
                let pagina = 1;
                while (true) {
                    const res = await fetch(`${PB_URL}/api/collections/consultas/records?filter=(mes=${mesIdx}%26%26ano=${ano})&perPage=200&page=${pagina}`);
                    const data = await res.json();
                    if (!data.items || data.items.length === 0) break;
                    await Promise.all(data.items.map(item =>
                        fetch(`${PB_URL}/api/collections/consultas/records/${item.id}`, { method: 'DELETE' })
                    ));
                    if (data.items.length < 200) break;
                }
                // Insere em lotes de 50
                const LOTE = 50;
                for (let i = 0; i < linhas.length; i += LOTE) {
                    const lote = linhas.slice(i, i + LOTE);
                    await Promise.all(lote.map(linha => {
                        const body = {
                            convenio: String(linha.convenio || ''),
                            unidade: String(linha.unidade || ''),
                            diaSemana: String(linha.diaSemana || ''),
                            guia: String(linha.guia || ''),
                            data: String(linha.data || ''),
                            senha: String(linha.senha || ''),
                            numeroCarteirinha: String(linha.numeroCarteirinha || ''),
                            nomePaciente: String(linha.nomePaciente || ''),
                            terapia: String(linha.terapia || ''),
                            quantidade: String(linha.quantidade || ''),
                            nomeMedico: String(linha.nomeMedico || ''),
                            conselho: String(linha.conselho || ''),
                            cbo: String(linha.cbo || ''),
                            cid: String(linha.cid || ''),
                            responsavelTecnico: String(linha.responsavelTecnico || ''),
                            obs: String(linha.obs || ''),
                            situacao: String(linha.situacao || ''),
                            mes: Number(linha.mes),
                            ano: Number(linha.ano)
                        };
                        return fetch(`${PB_URL}/api/collections/consultas/records`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });
                    }));
                    await new Promise(r => setTimeout(r, 100));
                }
            } catch(e) { console.error('PB import error:', e); }
        }

        // Salva um único registro
        async function salvarRegistro(aba, registro) {
            try {
                const body = {
                    convenio: String(registro.convenio || ''),
                    unidade: String(registro.unidade || ''),
                    diaSemana: String(registro.diaSemana || ''),
                    guia: String(registro.guia || ''),
                    data: String(registro.data || ''),
                    senha: String(registro.senha || ''),
                    numeroCarteirinha: String(registro.numeroCarteirinha || ''),
                    nomePaciente: String(registro.nomePaciente || ''),
                    terapia: String(registro.terapia || ''),
                    quantidade: String(registro.quantidade || ''),
                    nomeMedico: String(registro.nomeMedico || ''),
                    conselho: String(registro.conselho || ''),
                    cbo: String(registro.cbo || ''),
                    cid: String(registro.cid || ''),
                    responsavelTecnico: String(registro.responsavelTecnico || ''),
                    obs: String(registro.obs || ''),
                    situacao: String(registro.situacao || ''),
                    mes: Number(registro.mes),
                    ano: Number(registro.ano)
                };
                // Verifica se já existe no PocketBase (tem id do PB)
                if (registro.pbId) {
                    await fetch(`${PB_URL}/api/collections/consultas/records/${registro.pbId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                } else {
                    const res = await fetch(`${PB_URL}/api/collections/consultas/records`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    return data.id; // retorna o id do PocketBase
                }
            } catch(e) { console.error('PB save error:', e); }
        }

        // Exclui um único registro
        async function excluirRegistro(aba, id) {
            try {
                await fetch(`${PB_URL}/api/collections/consultas/records/${id}`, { method: 'DELETE' });
            } catch(e) { console.error('PB delete error:', e); }
        }

        // Exclui múltiplos registros
        async function excluirRegistros(aba, ids) {
            try {
                await Promise.all(ids.map(id =>
                    fetch(`${PB_URL}/api/collections/consultas/records/${id}`, { method: 'DELETE' })
                ));
            } catch(e) { console.error('PB delete batch error:', e); }
        }

                function App() {
            const [user] = useState({ role: 'admin' });
            const [mes, setMes] = useState(new Date().getMonth());
            const [ano, setAno] = useState(new Date().getFullYear());
            const [consultas, setConsultas] = useState([]);
            const jaCarregou = React.useRef(false);
            const [busca, setBusca] = useState('');
            const [filtros, setFiltros] = useState({
                convenio: '',
                terapia: '',
                situacao: '',
                unidade: '',
                senha: '',
                profExecutor: ''
            });
            const [showModal, setShowModal] = useState(false);
            const [modoModal, setModoModal] = useState('add');
            const [editando, setEditando] = useState(null);
            const [listas, setListas] = useState(DADOS_INICIAIS);
            const [pagina, setPagina] = useState(1);
            const [showConfig, setShowConfig] = useState(false);
            const [temaEscuro, setTemaEscuro] = useState(true);
            const [selectedIds, setSelectedIds] = useState([]);
            const [navegandoMes, setNavegandoMes] = useState(false);
            const porPagina = 50;
            const [temAtualizacao, setTemAtualizacao] = useState(false);
            const [salvando, setSalvando] = useState(false);
            const ultimaVersaoSheets = React.useRef('');

            // Carregar do PocketBase uma vez ao abrir
            useEffect(() => {
                if (jaCarregou.current) return;
                jaCarregou.current = true;
                const aba = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
                carregarDoSheets(aba).then(linhas => {
                    if (linhas && linhas.length > 0) {
                        setConsultas(linhas.map(l => ({ 
                            ...l, 
                            id: l.id, // id do PocketBase
                            mes: Number(l.mes),
                            ano: Number(l.ano),
                            quantidade: l.quantidade !== '' ? l.quantidade : '',
                            terapia: String(l.terapia || '').trim()
                        })));
                        ultimaVersaoSheets.current = JSON.stringify(linhas);
                    }
                });
            }, []);

            // Carregar dados ao mudar de mês
            useEffect(() => {
                if (!jaCarregou.current) return;
                const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                setSalvando(true);
                carregarDoSheets(aba).then(linhas => {
                    setConsultas((linhas || []).map(l => ({
                        ...l,
                        id: l.id,
                        mes: Number(l.mes),
                        ano: Number(l.ano),
                        quantidade: l.quantidade !== '' ? l.quantidade : '',
                        terapia: String(l.terapia || '').trim()
                    })));
                    ultimaVersaoSheets.current = JSON.stringify(linhas || []);
                    setSalvando(false);
                });
            }, [mes, ano]);

            // Verificar atualizações a cada 3 minutos
            useEffect(() => {
                const timer = setInterval(() => {
                    const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                    carregarDoSheets(aba).then(linhas => {
                        if (linhas && JSON.stringify(linhas) !== ultimaVersaoSheets.current) {
                            ultimaVersaoSheets.current = JSON.stringify(linhas);
                            setTemAtualizacao(true);
                        }
                    });
                }, 3 * 60 * 1000);
                return () => clearInterval(timer);
            }, [mes, ano]);

            // Função para salvar no Sheets
            const salvar = React.useCallback(async (lista) => {
                setSalvando(true);
                const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                await salvarNoSheets(aba, lista);
                setSalvando(false);
            }, [mes, ano]);

            useEffect(() => {
                if (temaEscuro) {
                    document.body.classList.add('tema-escuro');
                    document.documentElement.style.setProperty('--bg-dark', '#0f172a');
                    document.documentElement.style.setProperty('--bg-card', '#1e293b');
                    document.documentElement.style.setProperty('--bg-hover', '#334155');
                    document.documentElement.style.setProperty('--text-light', '#f1f5f9');
                    document.documentElement.style.setProperty('--text-gray', '#94a3b8');
                    document.documentElement.style.setProperty('--border', '#475569');
                    document.body.style.background = 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)';
                } else {
                    document.body.classList.remove('tema-escuro');
                    document.documentElement.style.setProperty('--bg-dark', '#f8fafc');
                    document.documentElement.style.setProperty('--bg-card', '#ffffff');
                    document.documentElement.style.setProperty('--bg-hover', '#f1f5f9');
                    document.documentElement.style.setProperty('--text-light', '#0f172a');
                    document.documentElement.style.setProperty('--text-gray', '#64748b');
                    document.documentElement.style.setProperty('--border', '#e2e8f0');
                    document.body.style.background = 'linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%)';
                }
            }, [temaEscuro]);

            // Resetar página quando filtros ou busca mudarem
            useEffect(() => {
                setPagina(1);
            }, [filtros, busca]);

            const filtradas = useMemo(() => {
                let resultado = consultas.filter(c => {
                    if (Number(c.mes) !== Number(mes) || Number(c.ano) !== Number(ano)) return false;
                    
                    // OCULTAR CONSULTAS VAZIAS/INCOMPLETAS
                    // Verifica se nome é válido (não vazio, não só espaços, tem conteúdo real)
                    const nomeValido = c.nomePaciente && 
                                      typeof c.nomePaciente === 'string' && 
                                      c.nomePaciente.trim().length >= 3 && // Mínimo 3 caracteres
                                      c.nomePaciente.trim() !== '⚠️ SEM NOME' &&
                                      !/^[\s\u00A0]+$/.test(c.nomePaciente); // Não só espaços/nbsp
                    
                    if (!nomeValido) {
                        console.log('⚠️ OCULTANDO consulta sem nome válido. Nome atual:', JSON.stringify(c.nomePaciente), 'Situação:', c.situacao);
                        return false;
                    }
                    
                    // Ocultar cancelados APENAS se NÃO filtrou por situação
                    if (!filtros.situacao) {
                        const situacaoNorm = (c.situacao || '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                        if (situacaoNorm.includes('cancelad')) {
                            return false;
                        }
                    }
                    
                    // FILTROS PRIMEIRO (antes da busca)
                    if (filtros.convenio && c.convenio !== filtros.convenio) return false;
                    if (filtros.terapia && String(c.terapia).trim() !== String(filtros.terapia).trim()) return false;
                    if (filtros.unidade && c.unidade !== filtros.unidade) return false;
                    if (filtros.profExecutor && c.responsavelTecnico !== filtros.profExecutor) return false;
                    
                    // Filtro de situação (case-insensitive) com debug
                    if (filtros.situacao) {
                        const situacaoConsulta = (c.situacao || '').toString().trim().toLowerCase();
                        const situacaoFiltro = filtros.situacao.toString().trim().toLowerCase();
                        
                        // Debug para identificar problema
                        if (situacaoConsulta !== situacaoFiltro) {
                            console.log(`FILTRADO: "${c.nomePaciente}" - Situação: "${c.situacao}" (normalizado: "${situacaoConsulta}") não corresponde ao filtro: "${situacaoFiltro}"`);
                            return false;
                        } else {
                            console.log(`✅ PASSOU: "${c.nomePaciente}" - Situação: "${c.situacao}" corresponde ao filtro`);
                        }
                    }
                    
                    // Filtro de senha
                    if (filtros.senha) {
                        const senhaConsulta = String(c.senha || '').toLowerCase();
                        const senhaFiltro = String(filtros.senha || '').toLowerCase();
                        if (!senhaConsulta.includes(senhaFiltro)) {
                            return false;
                        }
                    }
                    
                    // Busca POR ÚLTIMO (depois de todos os filtros)
                    if (busca) {
                        const termo = busca.toLowerCase().trim();
                        
                        // Busca por carteirinha (exato)
                        if (String(c.numeroCarteirinha || '').includes(termo)) {
                            return true;
                        }
                        
                        // Busca por nome
                        const nomeCompleto = (c.nomePaciente || '').toLowerCase();
                        const palavrasBusca = termo.split(' ').filter(p => p.length > 0);
                        const palavrasNome = nomeCompleto.split(' ').filter(p => p.length > 0);
                        
                        if (palavrasBusca.length === 0) return true;
                        if (palavrasNome.length === 0) return false;
                        
                        // REGRA 1: Primeiro nome deve começar com primeira palavra digitada
                        if (!palavrasNome[0].startsWith(palavrasBusca[0])) {
                            return false;
                        }
                        
                        // REGRA 2: Se digitou mais palavras, todas devem existir no nome
                        if (palavrasBusca.length > 1) {
                            for (let i = 1; i < palavrasBusca.length; i++) {
                                const encontrou = palavrasNome.some(pn => pn.startsWith(palavrasBusca[i]));
                                if (!encontrou) return false;
                            }
                        }
                        
                        return true;
                    }
                    
                    return true;
                });
                
                // Ordenar por nome do paciente
                resultado.sort((a, b) => {
                    const nomeA = (a.nomePaciente || '').toLowerCase();
                    const nomeB = (b.nomePaciente || '').toLowerCase();
                    return nomeA.localeCompare(nomeB);
                });
                
                // Guardar total antes de paginar
                window.totalFiltradas = resultado.length;
                window.totalCanceladas = consultas.filter(c => 
                    Number(c.mes) === Number(mes) && Number(c.ano) === Number(ano) &&
                    (c.situacao || '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes('cancelad')
                ).length;
                window.totalGeral = consultas.filter(c =>
                    Number(c.mes) === Number(mes) && Number(c.ano) === Number(ano)
                ).length;
                window.totalAtivos = window.totalGeral - window.totalCanceladas;
                return resultado;
            }, [consultas, mes, ano, busca, filtros]);

            const totalPaginas = Math.ceil((window.totalFiltradas || 0) / porPagina);

            const handleAdd = (c) => {
                const novaConsulta = { ...c, id: 'temp_' + Date.now(), mes, ano };
                setSalvando(true);
                salvarRegistro(`${ano}-${String(mes+1).padStart(2,'0')}`, novaConsulta).then((pbId) => {
                    setSalvando(false);
                    // Recarrega dados do PocketBase para garantir ordem correta
                    const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                    carregarDoSheets(aba).then(linhas => {
                        if (linhas && linhas.length > 0) {
                            setConsultas(linhas.map((l, i) => ({
                                ...l,
                                id: l.id || l.pbId,
                                mes: Number(l.mes),
                                ano: Number(l.ano),
                                terapia: String(l.terapia !== undefined && l.terapia !== null ? l.terapia : '').trim()
                            })));
                        }
                    });
                    setPagina(1);
                    alert(`✅ ${c.nomePaciente} adicionado(a)!`);
                });
                setShowModal(false);
            };

            const handleEdit = (c) => {
                const novas = consultas.map(x => x.id === c.id ? c : x);
                setConsultas(novas);
                // Salva só o registro alterado
                const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                setSalvando(true);
                salvarRegistro(aba, c).then(() => setSalvando(false));
                setShowModal(false);
            };

            const handleDelete = (id) => {
                if (confirm('Excluir?')) {
                    const novas = consultas.filter(c => c.id !== id);
                    setConsultas(novas);
                    const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                    setSalvando(true);
                    excluirRegistro(aba, id).then(() => setSalvando(false));
                }
            };

            const handleToggleSelect = (id) => {
                if (selectedIds.includes(id)) {
                    setSelectedIds(selectedIds.filter(sid => sid !== id));
                } else {
                    setSelectedIds([...selectedIds, id]);
                }
            };

            const handleSelectAll = () => {
                // Pegar TODAS as consultas filtradas, não só da página
                const todasFiltradas = consultas.filter(c => {
                    if (Number(c.mes) !== Number(mes) || Number(c.ano) !== Number(ano)) return false;
                    
                    if (busca) {
                        const termo = busca.toLowerCase();
                        const match = c.nomePaciente?.toLowerCase().includes(termo) ||
                                     String(c.numeroCarteirinha || '').includes(termo);
                        if (!match) return false;
                    }
                    
                    if (filtros.convenio && c.convenio !== filtros.convenio) return false;
                    if (filtros.terapia && String(c.terapia).trim() !== String(filtros.terapia).trim()) return false;
                    if (filtros.situacao && (c.situacao || '') !== filtros.situacao) return false;
                    if (filtros.unidade && c.unidade !== filtros.unidade) return false;
                    
                    if (filtros.senha) {
                        const senhaConsulta = String(c.senha || '').toLowerCase();
                        const senhaFiltro = String(filtros.senha || '').toLowerCase();
                        if (!senhaConsulta.includes(senhaFiltro)) return false;
                    }
                    
                    return true;
                });
                
                const idsTodasFiltradas = todasFiltradas.map(c => c.id);
                setSelectedIds(idsTodasFiltradas);
            };

            const handleDeselectAll = () => {
                setSelectedIds([]);
            };

            const handleDeleteSelected = () => {
                if (selectedIds.length === 0) {
                    alert('Nenhuma consulta selecionada!');
                    return;
                }
                
                if (confirm(`Excluir ${selectedIds.length} consultas selecionadas?`)) {
                    const novas = consultas.filter(c => !selectedIds.includes(c.id));
                    setConsultas(novas);
                    const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                    setSalvando(true);
                    excluirRegistros(aba, selectedIds).then(() => setSalvando(false));
                    setSelectedIds([]);
                }
            };

            const handleStatus = (id, situacao) => {
                const novas = consultas.map(c => c.id === id ? { ...c, situacao } : c);
                setConsultas(novas);
                const registro = novas.find(c => c.id === id);
                const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                setSalvando(true);
                salvarRegistro(aba, registro).then(() => setSalvando(false));
            };

            const handleDupExata = (c) => {
                const novo = { ...c, id: Date.now() };
                const novas = [...consultas, novo];
                setConsultas(novas);
                const aba = `${ano}-${String(mes+1).padStart(2,'0')}`;
                setSalvando(true);
                salvarRegistro(aba, novo).then(() => setSalvando(false));
            };

            const handleDupEdit = (c) => {
                const novo = {
                    id: Date.now(),
                    convenio: c.convenio,
                    unidade: c.unidade,
                    conselho: c.conselho,
                    nomePaciente: c.nomePaciente,
                    numeroCarteirinha: c.numeroCarteirinha,
                    cid: c.cid,
                    cbo: c.cbo,
                    terapia: c.terapia,
                    diaSemana: '', guia: '', data: '', senha: '', quantidade: '',
                    nomeMedico: '', responsavelTecnico: '', situacao: '', obs: '',
                    mes, ano
                };
                const novaLista = [...consultas, novo];
                setConsultas(novaLista);
                salvar(novaLista);
                setEditando(novo);
                setModoModal('edit');
                setShowModal(true);
            };

            const handleDupMes = () => {
                // Verificar se já existe registro no próximo mês
                const proxMesCheck = mes === 11 ? 0 : mes + 1;
                const proxAnoCheck = mes === 11 ? ano + 1 : ano;
                const jaExisteProxMes = consultas.some(c => Number(c.mes) === proxMesCheck && Number(c.ano) === proxAnoCheck);
                if (jaExisteProxMes) {
                    const nomeMesProx = MESES[proxMesCheck];
                    alert('⚠️ ' + nomeMesProx + ' já possui registros!\n\nApague todos os registros de ' + nomeMesProx + ' antes de duplicar.');
                    return;
                }
                // Verificar se tem filtro ativo
                const temFiltro = filtros.convenio || filtros.terapia || filtros.situacao || filtros.unidade || filtros.profExecutor || busca;
                if (temFiltro) {
                    alert('⚠️ Para duplicar o mês, remova todos os filtros ativos primeiro!\n\nClique em "Limpar Filtros" e tente novamente.');
                    return;
                }
                
                const situacoesExcluir = ['cancelado', 'cancelada'];
                const doMes = consultas.filter(c => {
                    if (Number(c.mes) !== Number(mes) || Number(c.ano) !== Number(ano)) return false;
                    const sit = (c.situacao || '').toLowerCase().trim();
                    if (situacoesExcluir.includes(sit)) return false;
                    return true;
                });
                if (!doMes.length) return alert('Sem consultas elegíveis neste mês!');
                const cancelados = consultas.filter(c => {
                    if (Number(c.mes) !== Number(mes) || Number(c.ano) !== Number(ano)) return false;
                    const sit = (c.situacao || '').toLowerCase().trim();
                    return situacoesExcluir.includes(sit);
                });
                const msg = cancelados.length > 0 
                    ? `Duplicar ${doMes.length} consultas para o próximo mês?\n\n(${cancelados.length} canceladas serão ignoradas)`
                    : `Duplicar ${doMes.length} consultas para o próximo mês?`;
                if (!confirm(msg)) return;

                const proxMes = mes === 11 ? 0 : mes + 1;
                const proxAno = mes === 11 ? ano + 1 : ano;

                const novas = doMes.map(c => ({
                    id: Date.now() + Math.random(),
                    convenio: c.convenio,
                    unidade: c.unidade,
                    conselho: c.conselho,
                    nomePaciente: c.nomePaciente,
                    numeroCarteirinha: c.numeroCarteirinha,
                    cid: c.cid,
                    cbo: c.cbo,
                    terapia: c.terapia,
                    responsavelTecnico: c.responsavelTecnico,
                    diaSemana: '', guia: '', data: '', senha: '', quantidade: '',
                    nomeMedico: '', situacao: '', obs: '',
                    mes: proxMes,
                    ano: proxAno
                }));

                const novaLista = [...consultas, ...novas];
                setConsultas(novaLista);
                salvar(novaLista);
                setMes(proxMes);
                setAno(proxAno);
                alert(`✅ ${novas.length} consultas duplicadas!`);
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const wb = XLSX.read(data, { type: 'array' });
                        
                        let imported = [];
                        let novosValores = {
                            convenios: new Set(listas.convenios),
                            unidades: new Set(listas.unidades),
                            terapias: new Set(listas.terapias),
                            responsaveis: new Set(listas.responsaveis),
                            conselhos: new Set(listas.conselhos),
                            cids: new Set(listas.cids),
                            cbos: new Set(listas.cbos),
                            situacoes: new Set(listas.situacoes),
                            diasSemana: new Set(listas.diasSemana)
                        };

                        wb.SheetNames.forEach((sheetName, idx) => {
                            const ws = wb.Sheets[sheetName];
                            const json = XLSX.utils.sheet_to_json(ws, { defval: '' });

                            // Identificar mês pelo nome da aba
                            let mesImportado = idx; // padrão: usar posição
                            
                            // Normalizar nome da aba (remover acentos, espaços extras, lowercase)
                            const nomeAbaNormalizado = sheetName
                                .toLowerCase()
                                .normalize('NFD')
                                .replace(/[\u0300-\u036f]/g, '')
                                .trim();
                            
                            console.log(`DEBUG: Aba "${sheetName}" normalizada como "${nomeAbaNormalizado}"`);
                            
                            // Procurar mês no nome da aba
                            MESES.forEach((nomeMes, indexMes) => {
                                const mesNormalizado = nomeMes
                                    .toLowerCase()
                                    .normalize('NFD')
                                    .replace(/[\u0300-\u036f]/g, '');
                                
                                if (nomeAbaNormalizado.includes(mesNormalizado)) {
                                    console.log(`DEBUG: "${nomeAbaNormalizado}" contém "${mesNormalizado}" -> Mês ${indexMes} (${nomeMes})`);
                                    mesImportado = indexMes;
                                }
                            });
                            
                            console.log(`DEBUG: Importando aba "${sheetName}" como ${MESES[mesImportado]} (índice ${mesImportado})`);
                            
                            // Debug: mostrar colunas da primeira linha
                            if (idx === 0 && json.length > 0) {
                                console.log('=== COLUNAS ENCONTRADAS NA PLANILHA ===');
                                Object.keys(json[0]).forEach((col, i) => {
                                    console.log(`${i + 1}. "${col}"`);
                                });
                                console.log('========================================');
                            }

                            json.forEach((row, rowIndex) => {
                                // Converter data do Excel se necessário
                                let dataFormatada = '';
                                if (row['DATA'] || row['DATA ']) {
                                    const dataVal = row['DATA'] || row['DATA '];
                                    if (typeof dataVal === 'number') {
                                        // Data do Excel (número serial)
                                        const date = new Date((dataVal - 25569) * 86400 * 1000);
                                        dataFormatada = date.toISOString().split('T')[0];
                                    } else {
                                        dataFormatada = String(dataVal).trim();
                                    }
                                }

                                const c = {
                                    id: Date.now() + Math.random(),
                                    convenio: String(row['CONVÊNIOS'] || row['CONVENIOS'] || row['CONVÊNIO'] || row['CONVENIO'] || '').trim(),
                                    unidade: String(row['UNIDADE'] || '').trim(),
                                    diaSemana: String(row['SEMANA'] || row['DIA DA SEMANA'] || row[' SEMANA'] || '').trim(),
                                    guia: String(row['GUIA'] || row['GUIA '] || '').trim(),
                                    data: dataFormatada,
                                    senha: String(row['SENHA'] || '').trim(),
                                    numeroCarteirinha: String(row['CARTEIRINHA'] || '').trim(),
                                    nomePaciente: String(row['NOME DO PACIENTE'] || row['NOME DO PACIENTE '] || row['NOME'] || '').trim(),
                                    terapia: String(row['TERAPIA'] !== undefined && row['TERAPIA'] !== null ? row['TERAPIA'] : '').trim(),
                                    quantidade: String(row['QUANT'] || row['QUANTIDADE'] || '').trim(),
                                    nomeMedico: String(row['PROFISSIONAL SOLICITANTE'] || row['PROFISSIONAL SOLICITANTE '] || '').trim(),
                                    conselho: String(row['CONSELHO'] || '').trim(),
                                    cbo: String(row['CBO'] || '').trim(),
                                    cid: String(row['CID'] || '').trim(),
                                    responsavelTecnico: String(
                                        row['PROF.EXEC.'] ||
                                        row['PROFISSIONAL EXECUTOR'] || 
                                        row['PROFISSIONAL EXECUTANTE'] ||
                                        row['Prof.executor'] || 
                                        row['PROF.EXECUTOR'] || 
                                        row['Prof. Executor'] || 
                                        row['Prof.Executor'] || 
                                        row['PROF. EXECUTOR'] ||
                                        row['PROF. EXECUTANTE'] ||
                                        row['Prof. Executante'] ||
                                        ''
                                    ).trim(),
                                    obs: String(row['OBSERVAÇÃO'] || row['OBSERVACAO'] || '').trim(),
                                    situacao: String(row['SITUAÇÃO'] || row['SITUACAO'] || '').trim(),
                                    mes: mesImportado,
                                    ano: ano
                                };

                                if (c.convenio) novosValores.convenios.add(c.convenio);
                                if (c.unidade) novosValores.unidades.add(c.unidade);
                                if (c.terapia !== '') novosValores.terapias.add(c.terapia);
                                if (c.responsavelTecnico) novosValores.responsaveis.add(c.responsavelTecnico);
                                if (c.conselho) novosValores.conselhos.add(c.conselho);
                                if (c.cid) novosValores.cids.add(c.cid);
                                if (c.cbo) novosValores.cbos.add(c.cbo);
                                if (c.situacao) novosValores.situacoes.add(c.situacao);
                                if (c.diaSemana) novosValores.diasSemana.add(c.diaSemana);

                                if (c.nomePaciente) {
                                    imported.push(c);
                                } else if (rowIndex < 5) {
                                    // Mostrar primeiras 5 linhas ignoradas para debug
                                    console.warn(`LINHA ${rowIndex + 2} IGNORADA (sem nome de paciente):`, row);
                                }
                            });
                        });

                        console.log(`DEBUG: Total de linhas processadas: ${wb.SheetNames.reduce((acc, name) => acc + XLSX.utils.sheet_to_json(wb.Sheets[name]).length, 0)}`);
                        console.log(`DEBUG: Total de linhas importadas: ${imported.length}`);
                        console.log(`DEBUG: Linhas com nome de paciente válido: ${imported.length}`);

                        setListas({
                            convenios: Array.from(novosValores.convenios),
                            unidades: Array.from(novosValores.unidades),
                            terapias: Array.from(novosValores.terapias),
                            responsaveis: Array.from(novosValores.responsaveis),
                            conselhos: Array.from(novosValores.conselhos),
                            cids: Array.from(novosValores.cids),
                            cbos: Array.from(novosValores.cbos),
                            situacoes: Array.from(novosValores.situacoes),
                            diasSemana: Array.from(novosValores.diasSemana)
                        });

                        const novaLista = [...consultas, ...imported];
                        setConsultas(novaLista);
                        salvar(novaLista);
                        
                        // Ir para o primeiro mês que tem dados importados
                        if (imported.length > 0) {
                            setMes(imported[0].mes);
                            setAno(imported[0].ano);
                        }
                        
                        setPagina(1);
                        alert(`✅ ${imported.length} consultas importadas de ${wb.SheetNames.length} abas!\n\nVocê está vendo: ${MESES[imported[0]?.mes || 0]} ${imported[0]?.ano || ano}`);
                        e.target.value = '';
                    } catch (err) {
                        alert('❌ Erro ao importar: ' + err.message + '\n\nVerifique se o arquivo está no formato correto.');
                        console.error(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const handleExport = () => {
                try {
                    const wb = XLSX.utils.book_new();
                    const porMes = {};

                    consultas.forEach(c => {
                        const m = MESES[c.mes];
                        if (!porMes[m]) porMes[m] = [];
                        porMes[m].push(c);
                    });

                    Object.keys(porMes).forEach(m => {
                        const dados = porMes[m].map(c => ({
                            'CONVÊNIOS': c.convenio,
                            'UNIDADE': c.unidade,
                            'SEMANA': c.diaSemana,
                            'GUIA': c.guia,
                            'DATA': c.data,
                            'SENHA': c.senha,
                            'CARTEIRINHA': c.numeroCarteirinha,
                            'NOME DO PACIENTE': c.nomePaciente,
                            'TERAPIA': String(c.terapia || ''),
                            'QUANT': c.quantidade,
                            'PROFISSIONAL SOLICITANTE': c.nomeMedico,
                            'CONSELHO': c.conselho,
                            'CBO': c.cbo,
                            'CID': c.cid,
                            'Prof.executor': c.responsavelTecnico,
                            'OBSERVAÇÃO': c.obs,

                    <div className="header">
                        <div className="header-top">
                            <h2>⚙️ Configurações - Gerenciar Listas</h2>
                            <div style={{display: 'flex', gap: '10px'}}>
                                <button className="btn btn-secondary" onClick={() => setTemaEscuro(!temaEscuro)}>
                                    {temaEscuro ? '☀️ Claro' : '🌙 Escuro'}
                                </button>
                                <button className="btn btn-secondary" onClick={onClose}>
                                    ← Voltar
                                </button>
                            </div>
                        </div>
                    </div>

                    {listConfigs.map(({ key, label, icon }) => (
                        <div key={key} style={{
                            background: 'var(--bg-card)',
                            padding: '20px',
                            borderRadius: '12px',
                            marginBottom: '20px',
                            border: '1px solid var(--border)'
                        }}>
                            <h3 style={{marginBottom: '16px', color: 'var(--primary)'}}>{icon} {label}</h3>
                            
                            {/* Botões de seleção e exclusão */}
                            {listas[key].length > 0 && (
                                <div style={{display: 'flex', gap: '8px', marginBottom: '12px'}}>
                                    <button 
                                        className="btn btn-secondary"
                                        onClick={() => toggleSelectAll(key)}
                                        style={{fontSize: '12px', padding: '6px 12px'}}
                                    >
                                        {selected[key].length === listas[key].length ? '⬜ Desmarcar Todos' : '☑️ Selecionar Todos'}
                                    </button>
                                    {selected[key].length > 0 && (
                                        <button 
                                            className="btn btn-danger"
                                            onClick={() => deleteSelected(key)}
                                            style={{fontSize: '12px', padding: '6px 12px'}}
                                        >
                                            🗑️ Excluir ({selected[key].length})
                                        </button>
                                    )}
                                </div>
                            )}
                            
                            <div style={{display: 'flex', flexDirection: 'column', gap: '10px'}}>
                                {listas[key].map(item => (
                                    <div key={item} style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '10px',
                                        padding: '10px',
                                        background: selected[key].includes(item) ? '#3b82f6' : 'var(--bg-dark)',
                                        borderRadius: '6px',
                                        border: '1px solid var(--border)',
                                        transition: 'background 0.2s'
                                    }}>
                                        <input 
                                            type="checkbox"
                                            checked={selected[key].includes(item)}
                                            onChange={() => toggleSelection(key, item)}
                                            style={{
                                                width: '18px',
                                                height: '18px',
                                                cursor: 'pointer'
                                            }}
                                        />
                                        <span style={{flex: 1}}>{item}</span>
                                        <button 
                                            className="btn btn-icon btn-danger"
                                            onClick={() => removeFromList(key, item)}
                                            style={{fontSize: '12px', padding: '4px 8px'}}
                                        >
                                            🗑️
                                        </button>
                                    </div>
                                ))}
                                
                                <div style={{display: 'flex', gap: '8px', marginTop: '8px'}}>
                                    <input
                                        type="text"
                                        placeholder={`Adicionar ${label.toLowerCase()}...`}
                                        value={newValues[key]}
                                        onChange={(e) => setNewValues({...newValues, [key]: e.target.value})}
                                        onKeyPress={(e) => {
                                            if (e.key === 'Enter' && newValues[key].trim()) {
                                                if (addToList(key, newValues[key])) {
                                                    setNewValues({...newValues, [key]: ''});
                                                } else {
                                                    alert('Este item já existe ou está vazio!');
                                                }
                                            }
                                        }}
                                        style={{
                                            flex: 1,
                                            padding: '10px',
                                            background: 'var(--bg-dark)',
                                            border: '1px solid var(--border)',
                                            borderRadius: '6px',
                                            color: 'var(--text-light)'
                                        }}
                                    />
                                    <button 
                                        className="btn btn-primary"
                                        onClick={() => {
                                            if (newValues[key].trim()) {
                                                if (addToList(key, newValues[key])) {
                                                    setNewValues({...newValues, [key]: ''});
                                                } else {
                                                    alert('Este item já existe ou está vazio!');
                                                }
                                            }
                                        }}
                                    >
                                        ➕ Adicionar
                                    </button>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function Modal({ modo, consulta, listas, onSave, onClose }) {
            const [form, setForm] = useState(consulta || {
                convenio: '', unidade: '', diaSemana: '', guia: '', data: '', senha: '',
                numeroCarteirinha: '', nomePaciente: '', terapia: '', quantidade: '',
                nomeMedico: '', conselho: '', cbo: '', cid: '', responsavelTecnico: '',
                obs: '', situacao: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.nomePaciente || !form.convenio) return alert('Preencha os campos obrigatórios!');
                onSave(form);
            };

            const handleDateChange = (value) => {
                setForm({...form, data: value});
            };

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{modo === 'add' ? '➕ Nova Consulta' : '✏️ Editar Consulta'}</h2>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>

                        <form onSubmit={handleSubmit}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label>Convênio *</label>
                                    <select value={form.convenio} onChange={(e) => setForm({...form, convenio: e.target.value})} required>
                                        <option value="">Selecione...</option>
                                        {listas.convenios.map(c => <option key={c}>{c}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Unidade</label>
                                    <select value={form.unidade} onChange={(e) => setForm({...form, unidade: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.unidades.map(u => <option key={u}>{u}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Semana</label>
                                    <select value={form.diaSemana} onChange={(e) => setForm({...form, diaSemana: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.diasSemana.map(d => <option key={d}>{d}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Guia</label>
                                    <input type="text" value={form.guia || ''} onChange={(e) => setForm({...form, guia: e.target.value})} />
                                </div>

                                <div className="form-group">
                                    <label>Data</label>
                                    <input 
                                        type="date" 
                                        value={form.data || ''} 
                                        onChange={(e) => handleDateChange(e.target.value)}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Senha</label>
                                    <input type="text" value={form.senha || ''} onChange={(e) => setForm({...form, senha: e.target.value})} />
                                </div>

                                <div className="form-group">
                                    <label>Carteirinha</label>
                                    <input type="text" value={form.numeroCarteirinha || ''} onChange={(e) => setForm({...form, numeroCarteirinha: e.target.value})} />
                                </div>

                                <div className="form-group">
                                    <label>Nome Paciente *</label>
                                    <input 
                                        type="text" 
                                        value={form.nomePaciente || ''} 
                                        onChange={(e) => setForm({...form, nomePaciente: e.target.value})}
                                        onBlur={(e) => setForm({...form, nomePaciente: toTitleCase(e.target.value)})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Terapia</label>
                                    <select value={form.terapia} onChange={(e) => setForm({...form, terapia: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.terapias.map(t => <option key={t}>{t}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Quantidade</label>
                                    <input type="number" value={form.quantidade || ''} onChange={(e) => setForm({...form, quantidade: e.target.value})} />
                                </div>

                                <div className="form-group">
                                    <label>Prof. Solicitante</label>
                                    <input 
                                        type="text" 
                                        value={form.nomeMedico || ''} 
                                        onChange={(e) => setForm({...form, nomeMedico: e.target.value})}
                                        onBlur={(e) => setForm({...form, nomeMedico: toTitleCase(e.target.value)})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Conselho</label>
                                    <select value={form.conselho} onChange={(e) => setForm({...form, conselho: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.conselhos.map(c => <option key={c}>{c}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>CBO</label>
                                    <select value={form.cbo} onChange={(e) => setForm({...form, cbo: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.cbos.map(c => <option key={c}>{c}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>CID</label>
                                    <select value={form.cid} onChange={(e) => setForm({...form, cid: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.cids.map(c => <option key={c}>{c}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Prof. Executor</label>
                                    <select value={form.responsavelTecnico} onChange={(e) => setForm({...form, responsavelTecnico: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.responsaveis.map(r => <option key={r}>{r}</option>)}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Situação</label>
                                    <select value={form.situacao} onChange={(e) => setForm({...form, situacao: e.target.value})}>
                                        <option value="">Selecione...</option>
                                        {listas.situacoes.map(s => <option key={s}>{s}</option>)}
                                    </select>
                                </div>

                                <div className="form-group full">
                                    <label>Observações</label>
                                    <textarea rows="3" value={form.obs || ''} onChange={(e) => setForm({...form, obs: e.target.value})} />
                                </div>
                            </div>

                            <div className="modal-footer">
                                <button type="button" className="btn btn-secondary" onClick={onClose}>Cancelar</button>
                                <button type="submit" className="btn btn-primary">{modo === 'add' ? '➕ Adicionar' : '💾 Salvar'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
